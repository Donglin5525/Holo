<svg width="1080" height="1440" viewBox="0 0 1080 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBF2"/>
      <stop offset=".55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF8FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="32" flood-color="#F46D38" flood-opacity=".14"/>
    </filter>
    <style>
      .font { font-family: "PingFang SC","Hiragino Sans GB","STYuanti-SC","Arial Rounded MT Bold",sans-serif; }
      .title { font-size: 66px; font-weight: 900; fill:#222; letter-spacing:0; }
      .sub { font-size: 30px; font-weight: 700; fill:#68635F; }
      .label { font-size: 29px; font-weight: 900; fill:#F46D38; }
      .body { font-size: 26px; font-weight: 750; fill:#3D3935; }
      .small { font-size: 22px; font-weight: 650; fill:#928C86; }
    </style>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <text class="font title" x="74" y="124">想法别憋着</text>
  <text class="font title" x="74" y="204">先说出来就行</text>
  <text class="font sub" x="78" y="264">语音 ASR 输入，AI 帮你把口癖和乱序清一清</text>

  <g transform="translate(96 340)" filter="url(#shadow)">
    <rect width="430" height="860" rx="78" fill="#202020"/>
    <rect x="20" y="24" width="390" height="812" rx="58" fill="#FFFDF9"/>
    <rect x="154" y="48" width="122" height="36" rx="18" fill="#050505"/>
    <text class="font small" x="64" y="100" fill="#222">23:00</text>
    <text class="font body" x="178" y="176" font-size="34">观点</text>
    <rect x="58" y="220" width="314" height="64" rx="20" fill="#FFFFFF" stroke="#ECE8E2"/>
    <text class="font small" x="94" y="260">搜索想法或标签...</text>
    <rect x="58" y="318" width="88" height="52" rx="26" fill="#FF6B36"/>
    <text class="font body" x="84" y="354" fill="#fff">全部</text>
    <circle cx="215" cy="545" r="52" fill="#F4F2EF"/>
    <path d="M199 575 L215 518 L231 575" stroke="#D7D4CF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="font body" x="170" y="662" fill="#A19C96">暂无想法</text>
    <rect x="20" y="730" width="390" height="106" rx="36" fill="#FFFFFF" stroke="#F3EFEA"/>
    <circle cx="315" cy="784" r="38" fill="#FF6B36"/>
    <text class="font title" x="298" y="804" font-size="54" fill="#fff">+</text>
    <text class="font small" x="95" y="796" fill="#F46D38">列表</text>
    <text class="font small" x="292" y="830" fill="#F46D38">新增</text>
  </g>

  <g transform="translate(575 378)">
    <rect width="408" height="148" rx="38" fill="#FFFFFF" stroke="#FFE1D1" stroke-width="3"/>
    <text class="font label" x="34" y="54">脑子乱的时候</text>
    <text class="font body" x="34" y="98">直接按住说就行</text>
    <text class="font small" x="34" y="130">先把想法救下来，比写得完美重要</text>

    <rect y="192" width="408" height="154" rx="38" fill="#FFF1E8"/>
    <text class="font label" x="34" y="246">ASR 语音输入</text>
    <text class="font body" x="34" y="290">碎碎念也能变文字</text>
    <text class="font small" x="34" y="324">走路、通勤、睡前灵感都能丢进去</text>

    <rect y="390" width="408" height="154" rx="38" fill="#FFFFFF" stroke="#E0F0FA" stroke-width="3"/>
    <text class="font label" x="34" y="444">自动清理口癖</text>
    <text class="font body" x="34" y="488">嗯啊然后其实吧</text>
    <text class="font small" x="34" y="522">这些废话，让 Holo 帮你轻轻扫掉</text>

    <rect y="588" width="408" height="154" rx="38" fill="#252525"/>
    <text class="font label" x="34" y="642" fill="#FFD8C6">还会智能总结</text>
    <text class="font body" x="34" y="686" fill="#FFF8F1">把一坨想法揉成重点</text>
    <text class="font small" x="34" y="720" fill="#D9D1CA">不是替你思考，是帮你留住那个念头</text>
  </g>
</svg>
