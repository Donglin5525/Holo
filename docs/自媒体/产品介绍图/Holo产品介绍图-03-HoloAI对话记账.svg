<svg width="1080" height="1440" viewBox="0 0 1080 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset=".55" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FFF1E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="32" flood-color="#6E8BAB" flood-opacity=".18"/>
    </filter>
    <style>
      .font { font-family: "PingFang SC","Hiragino Sans GB","STYuanti-SC","Arial Rounded MT Bold",sans-serif; }
      .title { font-size: 66px; font-weight: 900; fill:#222; letter-spacing:0; }
      .sub { font-size: 30px; font-weight: 700; fill:#68635F; }
      .label { font-size: 29px; font-weight: 900; fill:#F46D38; }
      .body { font-size: 26px; font-weight: 750; fill:#3D3935; }
      .small { font-size: 22px; font-weight: 650; fill:#928C86; }
    </style>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <text class="font title" x="74" y="124">一句话记账</text>
  <text class="font title" x="74" y="204">顺便问问最近状态</text>
  <text class="font sub" x="78" y="264">像聊天一样，把账记了，把状态也看了</text>

  <g transform="translate(565 330)" filter="url(#shadow)">
    <rect width="430" height="870" rx="78" fill="#202020"/>
    <rect x="20" y="24" width="390" height="822" rx="58" fill="#FFFDF9"/>
    <rect x="154" y="48" width="122" height="36" rx="18" fill="#050505"/>
    <text class="font body" x="154" y="160">HOLO AI</text>
    <circle cx="76" cy="156" r="28" fill="#F3F0EC"/>
    <text class="font body" x="68" y="166" fill="#8B8680">×</text>
    <rect x="155" y="278" width="220" height="56" rx="28" fill="#DDF0FF"/>
    <text class="font body" x="178" y="314">沙发 2100 分三期</text>
    <rect x="60" y="372" width="300" height="194" rx="34" fill="#FFFFFF" stroke="#F1ECE7"/>
    <text class="font body" x="104" y="434">沙发</text>
    <text class="font title" x="104" y="506" font-size="46" fill="#B8B8B8">-¥2100</text>
    <text class="font small" x="104" y="552">购物 · 家具</text>
    <text class="font small" x="272" y="552" fill="#F85C51">已记录</text>
    <rect x="165" y="608" width="210" height="56" rx="28" fill="#DDF0FF"/>
    <text class="font body" x="190" y="644">今天整体状态？</text>
    <rect x="60" y="704" width="300" height="132" rx="34" fill="#FFFFFF" stroke="#F1ECE7"/>
    <text class="font label" x="104" y="756">综合分析</text>
    <text class="font small" x="104" y="790">亮点 2 条 · 提醒 3 条</text>
    <text class="font label" x="104" y="826">点击查看详细分析 ›</text>
  </g>

  <g transform="translate(78 360)">
    <rect width="410" height="142" rx="38" fill="#FFFFFF" stroke="#D9ECFA" stroke-width="3"/>
    <text class="font label" x="34" y="54">懒得点分类？直接说</text>
    <text class="font body" x="34" y="98">「沙发 2100 分三期」</text>
    <text class="font small" x="34" y="128">HoloAI 会自动拆成可确认的账</text>

    <rect y="186" width="410" height="150" rx="38" fill="#FFF1E8"/>
    <text class="font label" x="34" y="240">对话记账不是噱头</text>
    <text class="font body" x="34" y="284">它能懂金额、分类、分期</text>
    <text class="font small" x="34" y="318">说人话，它就尽量按人话办事</text>

    <rect y="380" width="410" height="154" rx="38" fill="#FFFFFF" stroke="#FFE1D1" stroke-width="3"/>
    <text class="font label" x="34" y="434">还能问状态</text>
    <text class="font body" x="34" y="478">今天花了啥、漏了啥</text>
    <text class="font small" x="34" y="512">不只是报数，会给你一点上下文</text>

    <rect y="582" width="410" height="154" rx="38" fill="#252525"/>
    <text class="font label" x="34" y="636" fill="#FFD8C6">我喜欢这点</text>
    <text class="font body" x="34" y="680" fill="#FFF8F1">它像一个不凶你的记账搭子</text>
    <text class="font small" x="34" y="714" fill="#D9D1CA">你说一句，它帮你收拾一下生活现场</text>
  </g>
</svg>
