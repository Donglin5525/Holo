<svg width="1080" height="1440" viewBox="0 0 1080 1440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F1"/>
      <stop offset=".52" stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#F4FBF7"/>
    </linearGradient>
    <linearGradient id="orange" x1="355" y1="487" x2="662" y2="791" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFA875"/>
      <stop offset="1" stop-color="#FF5A22"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#F46D38" flood-opacity=".16"/>
    </filter>
    <style>
      .font { font-family: "PingFang SC","Hiragino Sans GB","STYuanti-SC","Arial Rounded MT Bold",sans-serif; }
      .title { font-size: 64px; font-weight: 900; fill: #252525; letter-spacing: 0; }
      .sub { font-size: 30px; font-weight: 650; fill: #69635D; }
      .tag { font-size: 28px; font-weight: 800; fill: #F46D38; }
      .body { font-size: 28px; font-weight: 650; fill: #44413D; }
      .small { font-size: 22px; font-weight: 650; fill: #918B84; }
    </style>
  </defs>

  <rect width="1080" height="1440" rx="0" fill="url(#bg)"/>
  <circle cx="962" cy="143" r="112" fill="#FFE6D9"/>
  <circle cx="109" cy="1252" r="130" fill="#E8F7F0"/>

  <text class="font title" x="76" y="120">不是又一个记账软件</text>
  <text class="font title" x="76" y="196">是把生活拼回来的 Holo</text>
  <text class="font sub" x="80" y="256">记账、待办、想法、习惯、健康，终于不用各过各的了</text>

  <g transform="translate(130 330)" filter="url(#soft)">
    <rect x="0" y="0" width="420" height="860" rx="74" fill="#1F1F1F"/>
    <rect x="20" y="24" width="380" height="812" rx="56" fill="#FFFDF9"/>
    <rect x="150" y="46" width="120" height="36" rx="18" fill="#050505"/>
    <text class="font small" x="62" y="100" fill="#222">22:59</text>
    <text class="font small" x="64" y="188">Holo</text>
    <text class="font body" x="64" y="230">晚上好，东林</text>
    <rect x="122" y="278" width="190" height="46" rx="23" fill="#F7F3EE"/>
    <circle cx="150" cy="301" r="8" fill="#F85C51"/>
    <text class="font small" x="170" y="309">已过期 · 制定运动计划</text>
    <circle cx="210" cy="500" r="145" fill="url(#orange)" opacity=".95"/>
    <circle cx="210" cy="500" r="64" stroke="#FFD0B6" stroke-width="10" opacity=".55"/>
    <circle cx="210" cy="500" r="30" fill="#FFDCCB" opacity=".55"/>
    <g class="font small" fill="#58534E" font-weight="750">
      <rect x="182" y="330" width="58" height="58" rx="20" fill="#FFFFFF" filter="url(#soft)" opacity=".92"/>
      <text x="193" y="421">任务</text>
      <rect x="306" y="420" width="58" height="58" rx="20" fill="#FFFFFF" opacity=".92"/>
      <text x="313" y="511">财务</text>
      <rect x="272" y="620" width="58" height="58" rx="20" fill="#FFFFFF" opacity=".92"/>
      <text x="279" y="711">习惯</text>
      <rect x="70" y="620" width="58" height="58" rx="20" fill="#FFFFFF" opacity=".92"/>
      <text x="78" y="711">健康</text>
      <rect x="35" y="420" width="58" height="58" rx="20" fill="#FFFFFF" opacity=".92"/>
      <text x="43" y="511">观点</text>
    </g>
    <rect x="55" y="730" width="310" height="72" rx="36" fill="#FFFFFF" stroke="#F4EEE8"/>
    <circle cx="210" cy="766" r="36" fill="#FF6B36"/>
    <text class="font body" x="196" y="778" fill="#fff">✦</text>
  </g>

  <g transform="translate(600 385)">
    <rect x="0" y="0" width="360" height="112" rx="36" fill="#FFFFFF" stroke="#FFE1D1" stroke-width="3"/>
    <text class="font tag" x="32" y="44">一颗球管五件事</text>
    <text class="font small" x="32" y="80">记账、想法、任务、习惯、健康都在这</text>

    <rect x="-22" y="152" width="390" height="150" rx="38" fill="#FFF2EA"/>
    <text class="font tag" x="20" y="204">不只是记录</text>
    <text class="font body" x="20" y="250">它会把碎片串起来</text>
    <text class="font small" x="20" y="288">比如消费、睡眠和情绪终于能互相认识</text>

    <rect x="0" y="344" width="360" height="146" rx="38" fill="#FFFFFF" stroke="#E7F3EC" stroke-width="3"/>
    <text class="font tag" x="32" y="398">少一点切 App</text>
    <text class="font body" x="32" y="444">多一点被理解</text>
    <text class="font small" x="32" y="482">这就是我做 Holo 的原因</text>
  </g>

  <g transform="translate(76 1260)">
    <rect width="928" height="86" rx="43" fill="#252525"/>
    <text class="font body" x="46" y="54" fill="#FFF8F1">内测中，想试试这个「超级缝合怪」可以来找我</text>
  </g>
</svg>
