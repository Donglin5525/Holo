<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新建任务 UI 原型</title>
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #f6f4ef;
    --paper: #fffdf8;
    --ink: #24211d;
    --muted: #817970;
    --soft: #ebe4d8;
    --line: #ddd3c4;
    --primary: #d95f33;
    --primary-soft: #fae4da;
    --green: #32785f;
    --yellow: #b77d12;
    --red: #c83d31;
    --blue: #426a9a;
    --shadow: 0 18px 45px rgba(73, 54, 33, 0.11);
  }

  html, body {
    margin: 0;
    min-height: 100%;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0) 210px),
      var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
  }

  button, input, textarea { font: inherit; }
  button { border: 0; cursor: pointer; }

  .phone {
    width: 100%;
    max-width: 393px;
    min-height: 100vh;
    padding: 12px 18px 28px;
    position: relative;
  }

  .grabber {
    width: 38px;
    height: 5px;
    border-radius: 99px;
    background: rgba(36, 33, 29, 0.16);
    margin: 0 auto 10px;
  }

  .nav {
    height: 44px;
    display: grid;
    grid-template-columns: 72px 1fr 72px;
    align-items: center;
  }

  .nav button {
    background: transparent;
    color: var(--muted);
    padding: 8px 0;
    font-size: 16px;
  }

  .save {
    justify-self: end;
    color: var(--primary) !important;
    font-weight: 700;
    opacity: 0.38;
    transition: opacity .18s ease, transform .18s ease;
  }

  .save.ready { opacity: 1; }

  .nav-title {
    justify-self: center;
    color: rgba(36, 33, 29, 0.42);
    font-size: 13px;
    letter-spacing: 0;
  }

  .headline {
    padding: 10px 2px 14px;
  }

  .headline h1 {
    margin: 0;
    font-size: 29px;
    line-height: 1.12;
    letter-spacing: 0;
    font-weight: 760;
  }

  .headline p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.45;
  }

  .composer {
    padding: 2px 0 18px;
  }

  .title-input,
  .desc-input {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    padding: 0;
  }

  .title-input {
    font-size: 24px;
    line-height: 1.25;
    font-weight: 720;
  }

  .title-input::placeholder { color: rgba(36, 33, 29, 0.28); }

  .desc-input {
    min-height: 76px;
    margin-top: 12px;
    resize: none;
    font-size: 16px;
    line-height: 1.55;
  }

  .desc-input::placeholder { color: rgba(36, 33, 29, 0.36); }

  .quick-line {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 0 16px;
    scrollbar-width: none;
  }

  .quick-line::-webkit-scrollbar { display: none; }

  .chip {
    flex: 0 0 auto;
    min-height: 34px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    border: 1px solid rgba(36, 33, 29, 0.08);
    border-radius: 99px;
    background: rgba(255, 253, 248, 0.72);
    color: var(--muted);
    padding: 0 12px;
    box-shadow: 0 1px 0 rgba(255,255,255,.75) inset;
  }

  .chip strong {
    color: var(--ink);
    font-size: 13px;
  }

  .chip svg {
    width: 15px;
    height: 15px;
    stroke-width: 2.1;
  }

  .panel {
    background: rgba(255, 253, 248, 0.84);
    border: 1px solid rgba(68, 52, 31, 0.08);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    backdrop-filter: blur(16px);
  }

  .section { padding: 16px; }
  .section + .section { border-top: 1px solid rgba(68, 52, 31, 0.09); }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .section-title {
    margin: 0;
    font-size: 15px;
    font-weight: 720;
    line-height: 1.25;
  }

  .section-meta {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .field-row {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .field-row + .field-row { border-top: 1px solid rgba(68, 52, 31, 0.08); }

  .field-label {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .field-icon {
    width: 28px;
    height: 28px;
    border-radius: 9px;
    display: grid;
    place-items: center;
    background: var(--soft);
    color: var(--muted);
    flex: 0 0 auto;
  }

  .field-icon svg {
    width: 16px;
    height: 16px;
  }

  .field-text { min-width: 0; }

  .field-text b {
    display: block;
    font-size: 15px;
    line-height: 1.25;
  }

  .field-text span {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.25;
  }

  .field-value {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 14px;
    flex: 0 0 auto;
  }

  .chevron {
    width: 8px;
    height: 8px;
    border-right: 1.7px solid currentColor;
    border-bottom: 1.7px solid currentColor;
    transform: rotate(-45deg);
    opacity: .6;
  }

  .details-toggle {
    width: 100%;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent;
    color: var(--ink);
    padding: 0;
  }

  .details-toggle .field-label {
    flex: 1 1 auto;
    min-width: 0;
  }

  .details-toggle .field-value {
    min-width: 0;
    max-width: 34%;
    justify-content: flex-end;
  }

  .details-toggle .summary {
    color: var(--muted);
    font-size: 13px;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .details-toggle .chevron { transition: transform .2s ease; }
  .details-toggle.open .chevron { transform: rotate(45deg); }

  .advanced {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .24s ease;
  }

  .advanced.open { grid-template-rows: 1fr; }
  .advanced-inner { overflow: hidden; }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 4px 0 14px;
  }

  .priority {
    min-height: 48px;
    border-radius: 13px;
    background: rgba(36, 33, 29, 0.045);
    color: var(--muted);
    display: grid;
    place-items: center;
    gap: 4px;
    padding: 7px 4px;
  }

  .priority i {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    background: currentColor;
  }

  .priority span { font-size: 12px; }
  .priority.active { color: #fff; background: var(--primary); }
  .priority[data-tone="red"] { color: var(--red); }
  .priority[data-tone="orange"] { color: var(--primary); }
  .priority[data-tone="yellow"] { color: var(--yellow); }
  .priority[data-tone="gray"] { color: var(--muted); }
  .priority.active[data-tone] { color: #fff; }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    min-height: 34px;
    border-radius: 99px;
    padding: 0 12px;
    background: rgba(66, 106, 154, 0.11);
    color: var(--blue);
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
  }

  .tag.selected { background: var(--blue); color: #fff; }

  .check-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 13px;
  }

  .bar {
    height: 7px;
    flex: 1;
    border-radius: 99px;
    background: rgba(36, 33, 29, 0.08);
    overflow: hidden;
  }

  .bar span {
    display: block;
    height: 100%;
    width: 33%;
    border-radius: inherit;
    background: var(--green);
    transition: width .2s ease;
  }

  .check-list {
    display: grid;
    gap: 2px;
  }

  .check-item {
    min-height: 43px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-radius: 12px;
    padding: 7px 8px;
  }

  .check-item:hover { background: rgba(36, 33, 29, 0.035); }

  .check {
    width: 22px;
    height: 22px;
    border-radius: 99px;
    border: 2px solid rgba(36, 33, 29, 0.22);
    background: transparent;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    color: #fff;
  }

  .check svg {
    width: 14px;
    height: 14px;
    opacity: 0;
  }

  .check-item.done .check {
    border-color: var(--green);
    background: var(--green);
  }

  .check-item.done .check svg { opacity: 1; }

  .check-item p {
    margin: 0;
    flex: 1;
    min-width: 0;
    font-size: 15px;
    line-height: 1.35;
  }

  .check-item.done p {
    color: var(--muted);
    text-decoration: line-through;
  }

  .delete {
    width: 30px;
    height: 30px;
    border-radius: 10px;
    background: transparent;
    color: rgba(200, 61, 49, .72);
    display: grid;
    place-items: center;
    opacity: .72;
  }

  .delete svg {
    width: 15px;
    height: 15px;
  }

  .add-check {
    margin-top: 10px;
    min-height: 50px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px dashed rgba(217, 95, 51, .38);
    border-radius: 15px;
    background: rgba(250, 228, 218, .32);
    padding: 7px 8px 7px 12px;
    transition: border-color .18s ease, background .18s ease;
  }

  .add-check:focus-within {
    border-color: rgba(217, 95, 51, .72);
    background: rgba(250, 228, 218, .48);
  }

  .plus {
    width: 24px;
    height: 24px;
    border-radius: 99px;
    display: grid;
    place-items: center;
    background: var(--primary);
    color: #fff;
    flex: 0 0 auto;
  }

  .plus svg {
    width: 15px;
    height: 15px;
  }

  .add-check input {
    min-width: 0;
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    color: var(--ink);
    font-size: 15px;
  }

  .add-check input::placeholder { color: rgba(36, 33, 29, 0.42); }

  .hint {
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    flex: 0 0 auto;
  }

  .add-action {
    display: none;
    align-items: center;
    justify-content: center;
    min-width: 54px;
    height: 34px;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .add-check.has-text .hint { display: none; }
  .add-check.has-text .add-action { display: flex; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translate(-50%, 18px);
    width: min(340px, calc(100vw - 36px));
    border-radius: 16px;
    background: rgba(36, 33, 29, .92);
    color: #fff;
    padding: 12px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    font-size: 14px;
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  @media (max-width: 360px) {
    .phone { padding-left: 14px; padding-right: 14px; }
    .choice-grid { grid-template-columns: repeat(2, 1fr); }
    .headline h1 { font-size: 27px; }
    .details-toggle .field-value { max-width: 28%; }
    .field-text span { display: none; }
  }
</style>
</head>
<body>
  <main class="phone">
    <div class="grabber"></div>

    <nav class="nav" aria-label="新建任务导航">
      <button type="button" id="cancelBtn">取消</button>
      <div class="nav-title">任务</div>
      <button class="save" id="saveBtn" type="button">保存</button>
    </nav>

    <header class="headline">
      <h1>新建任务</h1>
      <p>先把事情写清楚，再补充时间、清单、标签和检查步骤。</p>
    </header>

    <section class="composer" aria-label="任务内容">
      <input class="title-input" id="titleInput" type="text" placeholder="任务标题">
      <textarea class="desc-input" id="descInput" placeholder="描述这件事的背景、完成标准或需要注意的点"></textarea>
    </section>

    <div class="quick-line" aria-label="常用属性">
      <button class="chip" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6.5h16M4 12h16M4 17.5h10"/></svg>
        <strong>默认清单</strong>
      </button>
      <button class="chip" type="button" id="dateChip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 3v4M17 3v4M4.5 9.5h15M6 5h12a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z"/></svg>
        <strong>今天</strong>
      </button>
      <button class="chip" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        <strong>不提醒</strong>
      </button>
    </div>

    <section class="panel">
      <div class="section">
        <div class="field-row">
          <button class="details-toggle" id="detailsToggle" type="button">
            <span class="field-label">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M12 5v14"/></svg>
              </span>
              <span class="field-text">
                <b>更多属性</b>
                <span>优先级和标签默认收起，减少创建时的干扰</span>
              </span>
            </span>
            <span class="field-value">
              <span class="summary" id="detailsSummary">中 · 2 个标签</span>
              <span class="chevron"></span>
            </span>
          </button>
        </div>

        <div class="advanced" id="advanced">
          <div class="advanced-inner">
            <div class="choice-grid" aria-label="优先级">
              <button class="priority" data-priority="紧急" data-tone="red" type="button"><i></i><span>紧急</span></button>
              <button class="priority" data-priority="高" data-tone="orange" type="button"><i></i><span>高</span></button>
              <button class="priority active" data-priority="中" data-tone="yellow" type="button"><i></i><span>中</span></button>
              <button class="priority" data-priority="低" data-tone="gray" type="button"><i></i><span>低</span></button>
            </div>
            <div class="tag-row" aria-label="标签">
              <button class="tag selected" data-tag="工作" type="button">工作</button>
              <button class="tag selected" data-tag="本周" type="button">本周</button>
              <button class="tag" data-tag="沟通" type="button">沟通</button>
              <button class="tag" data-tag="待确认" type="button">待确认</button>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="field-row">
          <button class="details-toggle" type="button">
            <span class="field-label">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
              </span>
              <span class="field-text">
                <b>所属清单</b>
                <span>保留原功能入口，当前为默认清单</span>
              </span>
            </span>
            <span class="field-value">默认清单<span class="chevron"></span></span>
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-head">
          <h2 class="section-title">检查清单</h2>
          <span class="section-meta" id="progressText">1/3 完成</span>
        </div>
        <div class="check-progress">
          <div class="bar"><span id="progressBar"></span></div>
        </div>
        <div class="check-list" id="checkList">
          <div class="check-item done">
            <button class="check" type="button" aria-label="切换完成">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m5 13 4 4L19 7"/></svg>
            </button>
            <p>确认需求范围</p>
            <button class="delete" type="button" aria-label="删除检查项">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>
            </button>
          </div>
          <div class="check-item">
            <button class="check" type="button" aria-label="切换完成">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m5 13 4 4L19 7"/></svg>
            </button>
            <p>拆成三个可执行步骤</p>
            <button class="delete" type="button" aria-label="删除检查项">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>
            </button>
          </div>
          <div class="check-item">
            <button class="check" type="button" aria-label="切换完成">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m5 13 4 4L19 7"/></svg>
            </button>
            <p>提交前复核一次</p>
            <button class="delete" type="button" aria-label="删除检查项">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>
            </button>
          </div>
        </div>
        <div class="add-check" id="addCheckBox">
          <span class="plus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
          </span>
          <input id="checkInput" type="text" placeholder="添加一个检查项">
          <span class="hint">输入后添加</span>
          <button class="add-action" id="addCheckBtn" type="button">添加</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast">请输入任务标题后再保存</div>

<script>
  const titleInput = document.getElementById('titleInput');
  const saveBtn = document.getElementById('saveBtn');
  const toast = document.getElementById('toast');
  const detailsToggle = document.getElementById('detailsToggle');
  const advanced = document.getElementById('advanced');
  const detailsSummary = document.getElementById('detailsSummary');
  const checkList = document.getElementById('checkList');
  const checkInput = document.getElementById('checkInput');
  const addCheckBox = document.getElementById('addCheckBox');
  const addCheckBtn = document.getElementById('addCheckBtn');
  const progressText = document.getElementById('progressText');
  const progressBar = document.getElementById('progressBar');

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1600);
  }

  titleInput.addEventListener('input', () => {
    saveBtn.classList.toggle('ready', titleInput.value.trim().length > 0);
  });

  saveBtn.addEventListener('click', () => {
    if (!titleInput.value.trim()) {
      titleInput.focus();
      showToast('先写一个任务标题');
      return;
    }
    showToast('原型演示：这里会保存任务');
  });

  detailsToggle.addEventListener('click', () => {
    detailsToggle.classList.toggle('open');
    advanced.classList.toggle('open');
  });

  document.querySelectorAll('.priority').forEach(button => {
    button.addEventListener('click', () => {
      document.querySelectorAll('.priority').forEach(item => item.classList.remove('active'));
      button.classList.add('active');
      updateDetailsSummary();
    });
  });

  document.querySelectorAll('.tag').forEach(button => {
    button.addEventListener('click', () => {
      button.classList.toggle('selected');
      updateDetailsSummary();
    });
  });

  function updateDetailsSummary() {
    const priority = document.querySelector('.priority.active')?.dataset.priority || '中';
    const tagCount = document.querySelectorAll('.tag.selected').length;
    detailsSummary.textContent = `${priority} · ${tagCount} 个标签`;
  }

  function updateProgress() {
    const items = [...checkList.querySelectorAll('.check-item')];
    const done = items.filter(item => item.classList.contains('done')).length;
    progressText.textContent = `${done}/${items.length} 完成`;
    progressBar.style.width = items.length ? `${Math.round(done / items.length * 100)}%` : '0%';
  }

  function bindCheckItem(item) {
    item.querySelector('.check').addEventListener('click', () => {
      item.classList.toggle('done');
      updateProgress();
    });
    item.querySelector('.delete').addEventListener('click', () => {
      item.remove();
      updateProgress();
    });
  }

  document.querySelectorAll('.check-item').forEach(bindCheckItem);

  checkInput.addEventListener('input', () => {
    addCheckBox.classList.toggle('has-text', checkInput.value.trim().length > 0);
  });

  checkInput.addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      addCheckItem();
    }
  });

  addCheckBtn.addEventListener('click', addCheckItem);

  function addCheckItem() {
    const text = checkInput.value.trim();
    if (!text) {
      checkInput.focus();
      return;
    }

    const item = document.createElement('div');
    item.className = 'check-item';
    item.innerHTML = `
      <button class="check" type="button" aria-label="切换完成">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m5 13 4 4L19 7"/></svg>
      </button>
      <p></p>
      <button class="delete" type="button" aria-label="删除检查项">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>
      </button>
    `;
    item.querySelector('p').textContent = text;
    checkList.appendChild(item);
    bindCheckItem(item);
    checkInput.value = '';
    addCheckBox.classList.remove('has-text');
    checkInput.focus();
    updateProgress();
  }

  updateProgress();
</script>
